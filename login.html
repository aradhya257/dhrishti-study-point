{% extends "base.html" %}
{% block content %}
<div class="login-shell">
  <div class="login-card">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock" style="font-size: 2rem; color: var(--sage-deep);"></i>
      <h3 class="mt-2 mb-0">Admin Login</h3>
      <p class="text-muted-light" style="font-size: .9rem;">{{ STUDY_POINT_NAME }}</p>
    </div>
    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" required autofocus>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary-brand w-100">Log In</button>
    </form>
    <div class="text-center mt-3">
      <a href="{{ url_for('main.home') }}" class="text-muted-light" style="font-size: .85rem;">
        <i class="bi bi-arrow-left"></i> Back to website
      </a>
    </div>
  </div>
</div>
{% endblock %}
