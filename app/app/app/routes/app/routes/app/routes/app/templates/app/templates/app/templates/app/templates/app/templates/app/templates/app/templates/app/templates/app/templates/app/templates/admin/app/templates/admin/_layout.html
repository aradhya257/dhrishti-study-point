{% extends "base.html" %}
{% block content %}
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="mb-4 px-2">
      <div style="font-family: var(--font-display); font-weight:700; font-size:1.1rem; color:#fff;">
        <i class="bi bi-book-half"></i> Admin Panel
      </div>
      <div style="font-size:.75rem; color: rgba(246,243,236,.6);">{{ STUDY_POINT_NAME }}</div>
    </div>
    <a href="{{ url_for('admin.dashboard') }}" class="{{ 'active' if request.endpoint == 'admin.dashboard' }}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="{{ url_for('admin.students') }}" class="{{ 'active' if request.endpoint in ['admin.students','admin.add_student','admin.edit_student'] }}">
      <i class="bi bi-people"></i> Students
    </a>
    <a href="{{ url_for('admin.attendance') }}" class="{{ 'active' if request.endpoint == 'admin.attendance' }}">
      <i class="bi bi-calendar2-check"></i> Attendance
    </a>
    <a href="{{ url_for('admin.fee_management') }}" class="{{ 'active' if request.endpoint == 'admin.fee_management' }}">
      <i class="bi bi-cash-coin"></i> Fee Management
    </a>
    <a href="{{ url_for('admin.messages') }}" class="{{ 'active' if request.endpoint == 'admin.messages' }}">
      <i class="bi bi-envelope"></i> Messages
    </a>
    <hr style="border-color: rgba(246,243,236,.15);">
    <a href="{{ url_for('main.home') }}"><i class="bi bi-globe"></i> View Website</a>
    <a href="{{ url_for('auth.logout') }}"><i class="bi bi-box-arrow-right"></i> Logout</a>
  </aside>
  <div class="admin-content">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
